name: Direct DL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct URLs (Separate with space, comma, or new line)'
        required: true
        type: string
      password:
        description: 'ZIP Password (Optional)'
        required: false
        type: string
        default: ''

jobs:
  direct-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 zip

      - name: Download Files
        shell: bash
        run: |
          RAW_URLS="${{ github.event.inputs.url }}"
          FORMATTED_URLS=$(echo "$RAW_URLS" | tr ',' ' ' | tr '\n' ' ')
          
          rm -rf tmp_downloads
          mkdir -p tmp_downloads dl
          
          for URL in $FORMATTED_URLS; do
            [ -z "$URL" ] && continue
            
            echo "Downloading: $URL"
            aria2c \
              --split=4 \
              --max-connection-per-server=4 \
              --dir="tmp_downloads" \
              "$URL"
          done

      - name: Zip & Split (Optional)
        shell: bash
        run: |
          PASS="${{ github.event.inputs.password }}"

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((95 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
            
            rm -f "dl/${BASENAME}.zip" "dl/${BASENAME}.z"*
            
            if [ -n "$PASS" ] || [ "$SIZE" -gt "$LIMIT" ]; then
              echo "Zipping: $BASENAME"
              
              PASS_ARG=""
              [ -n "$PASS" ] && PASS_ARG="-P $PASS"
              
              zip $PASS_ARG -s 95m "dl/${BASENAME}.zip" -j "$FILE"
              
              for ZPART in "dl/${BASENAME}".zip "dl/${BASENAME}".z*; do
                [ -f "$ZPART" ] && basename "$ZPART" >> new_files.txt
              done
            else
              cp "$FILE" "dl/$BASENAME"
              echo "$BASENAME" >> new_files.txt
            fi
          done

          rm -rf tmp_downloads

      - name: Generate Links.md
        shell: bash
        run: |
          [ ! -f new_files.txt ] && exit 0
          
          REPO="${{ github.repository }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          echo "## Direct Links" > Links.md
          echo "" >> Links.md
          
          while IFS= read -r FNAME; do
            ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$FNAME")
            URL="https://github.com/$REPO/raw/$BRANCH/dl/$ENCODED"
            
            echo "- [$FNAME]($URL)" >> Links.md
          done < new_files.txt
          
          rm -f new_files.txt

      - name: Push Changes
        run: |
          git config user.name "DL Bot"
          git config user.email "bot@users.noreply.github.com"
          
          git add dl/ Links.md
          git commit -m "Add direct downloads [skip ci]" || echo "Nothing to commit"
          git push
