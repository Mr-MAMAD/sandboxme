name: ero Video URL → Download → Release

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Direct file URLs (one per line or comma separated)'
        required: true
        type: string
      referer:
        description: 'Referer (optional)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Files
        env:
          RAW_URLS: ${{ github.event.inputs.urls }}
          REFERER: ${{ github.event.inputs.referer }}
        shell: bash
        run: |
          set -e
          mkdir -p upload

          echo "📥 Processing URLs..."

          echo "$RAW_URLS" | tr ', ' '\n' | sed '/^$/d' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | while read -r URL; do
            [ -z "$URL" ] && continue

            echo "⬇️ Downloading: $URL"

            # Extract filename safely
            NAME=$(basename "${URL%%\?*}")

            # fallback if empty
            [ -z "$NAME" ] && NAME="file_$(date +%s).bin"

            OUTPUT="upload/$NAME"

            # prevent overwrite
            if [ -f "$OUTPUT" ]; then
              OUTPUT="upload/$(date +%s)-$NAME"
            fi

            if [ -n "$REFERER" ]; then
              curl -L --fail \
                -H "Referer: $REFERER" \
                -A "Mozilla/5.0" \
                -o "$OUTPUT" "$URL" || echo "❌ Failed: $URL"
            else
              curl -L --fail \
                -A "Mozilla/5.0" \
                -o "$OUTPUT" "$URL" || echo "❌ Failed: $URL"
            fi
          done

          echo ""
          echo "✅ Download finished:"
          ls -lh upload/ || true

      - name: Split if >2GB
        shell: bash
        run: |
          set -e

          LIMIT=$((2 * 1024 * 1024 * 1024))

          for FILE in upload/*; do
            [ -f "$FILE" ] || continue

            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            NAME="${BASENAME%.*}"
            EXT="${BASENAME##*.}"

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "⚠️ Splitting: $BASENAME"

              split -b 2G -d --additional-suffix=".$EXT" "$FILE" "upload/${NAME}.part"

              rm "$FILE"
            fi
          done

      - name: Generate Release Info
        id: meta
        shell: bash
        run: |
          TAG="direct-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          echo "## 📦 Downloaded Files" > body.md
          echo "" >> body.md

          for FILE in upload/*; do
            [ -f "$FILE" ] || continue
            NAME=$(basename "$FILE")
            SIZE=$(du -sh "$FILE" | cut -f1)

            echo "- \`$NAME\` — **$SIZE**" >> body.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "📦 ${{ steps.meta.outputs.tag }}"
          body_path: body.md
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
