name: PH Downloader (100 URLs)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URLs (comma/space/newline separated) - up to 100 links'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: true
        type: choice
        options:
          - 'best'
          - '720p'
          - '480p'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Prepare URL List
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          # جداسازی URL ها
          echo "$INPUT_URL" | sed 's/[,[:space:]]\+/\n/g' | grep -v '^$' > urls.txt
          
          # محدود به 100 لینک
          head -n 100 urls.txt > urls_limited.txt
          mv urls_limited.txt urls.txt
          
          TOTAL=$(wc -l < urls.txt)
          echo "Total URLs: $TOTAL"
          echo "TOTAL_URLS=$TOTAL" >> $GITHUB_ENV
          
          echo ""
          echo "URLs to download:"
          cat -n urls.txt

      - name: Download Videos
        env:
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          mkdir -p output

          # تعیین فرمت بر اساس کیفیت
          if [ "$QUALITY" = "720p" ]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [ "$QUALITY" = "480p" ]; then
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          else
            FORMAT="bestvideo+bestaudio/best"
          fi

          # ایجاد اسکریپت دانلود
          cat > download.sh << 'SCRIPT'
          #!/bin/bash
          URL="$1"
          FORMAT="$2"
          INDEX="$3"
          
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36"
          
          for i in 1 2 3 4 5; do
            echo "[$INDEX] Attempt $i: $URL"
            yt-dlp -f "$FORMAT" \
              --merge-output-format mp4 \
              --no-playlist \
              --restrict-filenames \
              --user-agent "$USER_AGENT" \
              --referer "https://www.pornhub.com/" \
              --add-header "Accept-Language: en-US,en;q=0.9" \
              --sleep-requests 1 \
              --sleep-interval 2 \
              --max-sleep-interval 5 \
              --retries 3 \
              --fragment-retries 3 \
              --extractor-retries 3 \
              --ignore-errors \
              --no-check-certificates \
              -o "output/%(title).100s.%(ext)s" \
              "$URL" && exit 0
            
            sleep $((i * 3))
          done
          echo "$URL" >> failed.txt
          exit 1
          SCRIPT
          chmod +x download.sh

          # اجرای دانلودها (2 همزمان)
          INDEX=0
          while IFS= read -r url || [ -n "$url" ]; do
            [ -z "$url" ] && continue
            INDEX=$((INDEX + 1))
            ./download.sh "$url" "$FORMAT" "$INDEX" &
            
            while [ "$(jobs -r | wc -l)" -ge 2 ]; do
              sleep 2
            done
            sleep 3
          done < urls.txt

          wait

      - name: Check output
        id: check
        run: |
          COUNT=$(find output -type f -name "*.mp4" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Downloaded $COUNT video(s)"

      - name: Generate Tag
        if: steps.check.outputs.count != '0'
        id: tag
        run: echo "tag=run-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Downloaded Videos ${{ steps.tag.outputs.tag }}"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Failed URLs
        if: always()
        run: |
          if [ -f failed.txt ]; then
            FAILED=$(wc -l < failed.txt)
            echo "Failed downloads: $FAILED"
            cat failed.txt
          else
            echo "All downloads successful!"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Total URLs: $TOTAL_URLS" >> $GITHUB_STEP_SUMMARY
          echo "- Videos downloaded: ${{ steps.check.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          if [ -f failed.txt ]; then
            echo "- Failed: $(wc -l < failed.txt)" >> $GITHUB_STEP_SUMMARY
          fi
