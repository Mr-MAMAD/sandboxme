name: PH Downloader (Final Stable)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URLs (comma, space, or newline separated)'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: true
        type: choice
        options:
          - 'best'
          - '720p'
          - '480p'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Prepare URL List
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
        run: |
          # استفاده از environment variable برای جلوگیری از command injection
          echo "$INPUT_URL" | sed 's/[,[:space:]]\+/\n/g' | grep -v '^$' > urls.txt

          # محدود کردن به 30 لینک
          head -n 30 urls.txt > urls_tmp.txt
          mv urls_tmp.txt urls.txt

          echo "URLs (max 30):"
          cat urls.txt

      - name: Download Videos (Parallel + Retry)
        env:
          QUALITY: ${{ github.event.inputs.quality }}
        run: |
          mkdir -p output

          # تعیین فرمت بر اساس کیفیت
          if [ "$QUALITY" = "720p" ]; then
            FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [ "$QUALITY" = "480p" ]; then
            FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]"
          else
            FORMAT="bestvideo+bestaudio/best"
          fi

          # ایجاد اسکریپت دانلود
          cat > download.sh << 'SCRIPT'
          #!/bin/bash
          URL="$1"
          FORMAT="$2"
          for i in 1 2 3; do
            echo "Attempt $i: $URL"
            yt-dlp -f "$FORMAT" \
              --merge-output-format mp4 \
              --no-playlist \
              --restrict-filenames \
              -o "output/%(title).100s.%(ext)s" \
              "$URL" && exit 0
            sleep 2
          done
          echo "$URL" >> failed.txt
          exit 1
          SCRIPT
          chmod +x download.sh

          # اجرای موازی دانلودها
          while IFS= read -r url || [ -n "$url" ]; do
            [ -z "$url" ] && continue
            ./download.sh "$url" "$FORMAT" &
            
            # محدود کردن به 3 دانلود همزمان
            while [ "$(jobs -r | wc -l)" -ge 3 ]; do
              sleep 1
            done
          done < urls.txt

          # منتظر ماندن برای تمام دانلودها
          wait

      - name: Check output
        id: check
        run: |
          COUNT=$(find output -type f -name "*.mp4" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT video(s)"

      - name: Generate Tag
        if: steps.check.outputs.count != '0'
        id: tag
        run: echo "tag=run-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Downloaded Videos ${{ steps.tag.outputs.tag }}"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Failed URLs
        if: always()
        run: |
          if [ -f failed.txt ]; then
            echo "❌ Failed URLs:"
            cat failed.txt
          else
            echo "✅ All downloads successful"
          fi

      - name: Summary
        if: steps.check.outputs.count != '0'
        run: |
          echo "## 📦 Download Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release created successfully." >> $GITHUB_STEP_SUMMARY
