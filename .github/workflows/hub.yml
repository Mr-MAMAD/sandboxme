name: PH Downloader (Final Stable)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URLs (comma, space, or newline separated)'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: true
        type: choice
        options:
          - 'best'
          - '720p'
          - '480p'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Prepare URL List
        run: |
          RAW="${{ github.event.inputs.url }}"
          
          echo "$RAW" | tr ', ' '\n\n' | tr -s '\n' > urls.txt
          sed -i '/^\s*$/d' urls.txt

          echo "URLs:"
          cat urls.txt

      - name: Download Videos (Parallel + Retry)
        run: |
          QUALITY="${{ github.event.inputs.quality }}"
          mkdir -p output

          if [ "$QUALITY" = "720p" ]; then
            FORMAT="-f bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [ "$QUALITY" = "480p" ]; then
            FORMAT="-f bestvideo[height<=480]+bestaudio/best[height<=480]"
          else
            FORMAT="-f best"
          fi

          export FORMAT

          download() {
            URL="$1"
            for i in 1 2 3; do
              echo "Attempt $i: $URL"
              yt-dlp $FORMAT \
                --merge-output-format mp4 \
                -o "output/%(title)s.%(ext)s" \
                "$URL" && return 0
              sleep 2
            done
            echo "$URL" >> failed.txt
          }

          export -f download

          cat urls.txt | xargs -P 3 -I {} bash -c 'download "$@"' _ {}

      - name: Check output
        id: check
        run: |
          COUNT=$(ls -1 output 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Generate Tag
        if: steps.check.outputs.count != '0'
        id: tag
        run: echo "tag=run-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Downloaded Videos ${{ steps.tag.outputs.tag }}"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Failed URLs
        if: always()
        run: |
          if [ -f failed.txt ]; then
            echo "❌ Failed URLs:"
            cat failed.txt
          else
            echo "✅ All downloads successful"
          fi

      - name: Summary
        if: steps.check.outputs.count != '0'
        run: |
          echo "## 📦 Download Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release created successfully." >> $GITHUB_STEP_SUMMARY
