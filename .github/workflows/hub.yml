name: PH Downloader (Ultimate Stable)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URLs (max 30)'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: true
        type: choice
        options:
          - 'best'
          - '720p'
          - '480p'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

          # آپدیت برای جلوگیری از ارور extractor
          yt-dlp -U || true

      - name: Setup Cookies (optional)
        env:
          COOKIES: ${{ secrets.PH_COOKIES }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
          else
            touch cookies.txt
          fi

      - name: Prepare URLs (max 30)
        run: |
          RAW="${{ github.event.inputs.url }}"

          echo "$RAW" | tr ', ' '\n\n' | tr -s '\n' > urls.txt
          sed -i '/^\s*$/d' urls.txt

          head -n 30 urls.txt > urls2.txt
          mv urls2.txt urls.txt

          echo "Final URLs:"
          cat urls.txt

      - name: Download (Queue + Retry + AntiBlock)
        run: |
          QUALITY="${{ github.event.inputs.quality }}"
          mkdir -p output

          if [ "$QUALITY" = "720p" ]; then
            FORMAT="-f bestvideo[height<=720]+bestaudio/best[height<=720]"
          elif [ "$QUALITY" = "480p" ]; then
            FORMAT="-f bestvideo[height<=480]+bestaudio/best[height<=480]"
          else
            FORMAT="-f best"
          fi

          export FORMAT

          TOTAL=$(wc -l < urls.txt)
          echo 0 > progress.txt

          download() {
            URL="$1"

            COUNT=$(($(cat progress.txt)+1))
            echo $COUNT > progress.txt

            echo "[$COUNT/$TOTAL] $URL"

            for i in 1 2 3; do
              yt-dlp \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
                --add-header "Referer:https://www.pornhub.com/" \
                --retries 3 \
                --fragment-retries 3 \
                --cookies cookies.txt \
                $FORMAT \
                --merge-output-format mp4 \
                -o "output/%(title, id)s.%(ext)s" \
                "$URL" && return 0

              echo "Retry $i failed..."
              sleep 3
            done

            echo "$URL" >> failed.txt
          }

          export -f download
          export TOTAL

          cat urls.txt | xargs -P 3 -n 1 -I {} bash -c 'download "$@"' _ {}

      - name: Check output
        id: check
        run: |
          COUNT=$(ls -1 output 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Generate Tag
        if: steps.check.outputs.count != '0'
        id: tag
        run: echo "tag=run-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Downloaded Videos ${{ steps.tag.outputs.tag }}"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Failed
        if: always()
        run: |
          if [ -f failed.txt ]; then
            echo "❌ Failed URLs:"
            cat failed.txt
          else
            echo "✅ All downloads successful"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📊 Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Total: $(wc -l < urls.txt)" >> $GITHUB_STEP_SUMMARY
          
          if [ -f failed.txt ]; then
            echo "- Failed: $(wc -l < failed.txt)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Failed: 0" >> $GITHUB_STEP_SUMMARY
          fi
