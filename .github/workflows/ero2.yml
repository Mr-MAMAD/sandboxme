```yaml
name: Page URL → Extract & Download → Release

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Page URLs (one per line or comma separated)'
        required: true
        type: string
      referer:
        description: 'Referer (e.g: https://www.example.com/)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install yt-dlp
        run: |
          pip install -U yt-dlp

      - name: Download Videos
        env:
          RAW_URLS: ${{ github.event.inputs.urls }}
          REFERER: ${{ github.event.inputs.referer }}
        shell: bash
        run: |
          set -e

          mkdir -p upload

          EXTRA_ARGS=""
          if [ -n "$REFERER" ]; then
            EXTRA_ARGS="--referer $REFERER"
          fi

          echo "📥 Processing URLs..."
          echo "$RAW_URLS" | tr ',' '\n' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | while read -r URL; do
            [ -z "$URL" ] && continue

            echo "🔍 Extracting: $URL"

            yt-dlp \
              --merge-output-format mp4 \
              --output "upload/%(title).80B-%(id)s.%(ext)s" \
              --restrict-filenames \
              --no-playlist \
              --retries 5 \
              --fragment-retries 5 \
              --concurrent-fragments 4 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36" \
              $EXTRA_ARGS \
              "$URL" || echo "❌ Failed: $URL"
          done

          echo ""
          echo "✅ Download finished. Files:"
          ls -lh upload/ || true

      - name: Split if >2GB
        shell: bash
        run: |
          set -e

          LIMIT=$((2 * 1024 * 1024 * 1024))

          for FILE in upload/*; do
            [ -f "$FILE" ] || continue

            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            NAME="${BASENAME%.*}"
            EXT="${BASENAME##*.}"

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "⚠️ Splitting: $BASENAME"

              split -b 2G -d --additional-suffix=".$EXT" "$FILE" "upload/${NAME}.part"

              rm "$FILE"
            fi
          done

      - name: Generate Release Info
        id: meta
        shell: bash
        run: |
          TAG="dl-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          echo "## 🎬 Downloaded Videos" > body.md
          echo "" >> body.md

          for FILE in upload/*; do
            [ -f "$FILE" ] || continue
            NAME=$(basename "$FILE")
            SIZE=$(du -sh "$FILE" | cut -f1)

            echo "- \`$NAME\` — **$SIZE**" >> body.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "🎬 ${{ steps.meta.outputs.tag }}"
          body_path: body.md
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
