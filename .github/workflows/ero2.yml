name: Direct URL erome → Release
on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Direct URLs (one per line or comma separated)'
        required: true
        type: string
      referer:
        description: 'Referer header (e.g: https://example.com)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Files
        env:
          RAW_URLS: ${{ github.event.inputs.urls }}
          REFERER: ${{ github.event.inputs.referer }}
        shell: bash
        run: |
          mkdir -p upload

          echo "$RAW_URLS" | tr ',' '\n' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | while read -r URL; do
            [ -z "$URL" ] && continue

            FILENAME=$(basename "$URL" | cut -d'?' -f1)
            echo "📥 Downloading: $URL"

            EXTRA_HEADERS=""
            if [ -n "$REFERER" ]; then
              EXTRA_HEADERS="--header=Referer: $REFERER"
            fi

            aria2c \
              --split=16 \
              --max-connection-per-server=16 \
              --min-split-size=1M \
              --out="$FILENAME" \
              --dir="upload" \
              --retry-wait=3 \
              --max-tries=5 \
              --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --header="Referer: https://movie.ir" \
              "$URL" || echo "❌ Failed: $URL"
          done

          echo "✅ All done:"
          ls -lh upload/

      - name: Split if >2GB
        shell: bash
        run: |
          LIMIT=$((2 * 1024 * 1024 * 1024))
          for FILE in upload/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            NAME="${BASENAME%.*}"
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "⚠️ Splitting: $BASENAME"
              split -b 2G "$FILE" "upload/${NAME}.part"
              rm "$FILE"
            fi
          done

      - name: Generate Release Info
        id: meta
        shell: bash
        run: |
          TAG="dl-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          echo "## 📥 Downloaded Files" > body.md
          echo "" >> body.md
          for FILE in upload/*; do
            [ -f "$FILE" ] || continue
            NAME=$(basename "$FILE")
            SIZE=$(du -sh "$FILE" | cut -f1)
            echo "- \`$NAME\` — **$SIZE**" >> body.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "📥 ${{ steps.meta.outputs.tag }}"
          body_path: body.md
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
